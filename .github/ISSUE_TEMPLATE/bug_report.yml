name: Bug report
description: Something in lattice isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug! A small reproduction goes a long way.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, and what happened instead?
      placeholder: |
        I ran `lattice lint` on a vault with … and expected … but got …
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: Commands + a minimal note/vault that triggers it. Fabricate names — no private data.
      render: shell
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: lattice version
      description: Output of `lattice --version`
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      description: Output of `python --version`
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: OS
      options: [macOS, Linux, Windows, Other]
    validations:
      required: true
