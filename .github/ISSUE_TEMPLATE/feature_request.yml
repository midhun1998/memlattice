name: Feature request
description: Suggest an idea or improvement for lattice
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the pain point. "I'm always frustrated when …"
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like lattice to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed, and why they fall short.
  - type: checkboxes
    id: principles
    attributes:
      label: Fits lattice's principles?
      description: lattice stays dependency-light, file-native, vendor-neutral, and never bypasses the verification gate.
      options:
        - label: This keeps the core dependency-light (heavy deps go behind an extra)
        - label: This introduces no hardcoded vendor/tool name in core
        - label: This preserves "uncited claims can't enter the body"
